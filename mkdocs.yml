site_name: signet
site_description: Capability-based safety gates for LLM agents.
site_url: https://jeranaias.github.io/signet
repo_url: https://github.com/jeranaias/signet
repo_name: jeranaias/signet
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            docstring_style: google

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Checks:
    - Owner Resolution: checks/owner_resolution.md
    - Classification Gate: checks/classification_gate.md
  - Plugin development: plugin_dev.md
  - Contributing: ../CONTRIBUTING.md
  - Security: ../SECURITY.md
