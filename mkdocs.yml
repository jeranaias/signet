site_name: signet
site_description: Capability-based safety gates for LLM agents.
site_url: https://jeranaias.github.io/signet
repo_url: https://github.com/jeranaias/signet
repo_name: jeranaias/signet
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            docstring_style: google

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Checks:
    - Owner Resolution: checks/owner_resolution.md
    - Loopback Trust: checks/loopback_trust.md
    - Classification Gate: checks/classification_gate.md
    - Rate Limit: checks/rate_limit.md
    - Token Budget: checks/token_budget.md
    - Regex Content / Output: checks/regex_content.md
    - Prompt Injection: checks/prompt_injection.md
    - Scope Drift: checks/scope_drift.md
    - Continuing Consent: checks/continuing_consent.md
    - Tool Call Inspector: checks/tool_call_inspector.md
  - Plugin development: plugin_dev.md
  - Integrations:
    - Authentication (mTLS / JWT / OIDC): integrations/auth.md
  - Contributing: contributing.md
  - Security policy: security.md
  - Changelog: changelog.md
