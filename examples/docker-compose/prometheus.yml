# Minimal Prometheus scrape config for the signet metrics endpoint.
# Lives next to docker-compose.yml; mounted read-only into the
# prometheus container.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: signet
    metrics_path: /metrics
    static_configs:
      - targets: ["signet:8443"]
        labels:
          service: signet
          instance: docker-compose

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
