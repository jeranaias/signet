{{- /*
Only render a Secret if the operator did NOT supply an existing one.
The production path is to provision the HMAC secret via ESO,
SealedSecrets, or vault-csi and pass its name as
hmacSecret.existingSecret.
*/ -}}
{{- if not .Values.hmacSecret.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "signet.hmacSecretName" . }}
  labels:
    {{- include "signet.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ required "Either hmacSecret.existingSecret or hmacSecret.value must be set" .Values.hmacSecret.value | quote }}
{{- end -}}
