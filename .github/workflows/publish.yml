name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for hatchling version resolution
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build distributions
        run: python -m build
      - name: Inspect sdist + wheel
        run: |
          ls -la dist/
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Generate CycloneDX SBOM
        run: |
          python -m pip install --upgrade cyclonedx-bom
          # Component-graph SBOM for the built environment. Attached to
          # the GitHub release so downstreams can audit dependencies
          # without reproducing the build. cyclonedx-bom 7.x uses
          # `-o <file>` rather than the older `--outfile` flag.
          mkdir -p sbom
          cyclonedx-py environment --output-format json -o sbom/signet-sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing (PEP 740): the runner mints a short-lived
    # OIDC token PyPI verifies against the Trusted Publisher binding
    # configured at pypi.org/manage/account/publishing/. No long-lived
    # API token in repository secrets. PyPI publishes attestations
    # for each artifact automatically.
    #
    # Setup (one-time, manual): on the PyPI project page, add a
    # Trusted Publisher with:
    #   Owner:           jeranaias
    #   Repository:      signet
    #   Workflow:        publish.yml
    #   Environment:     (leave blank unless using an environment)
    #
    # Until the Trusted Publisher binding exists, this job will fail
    # on the OIDC token exchange. The previous API-token path can be
    # restored by re-adding ``password: ${{ secrets.PYPI_API_TOKEN }}``
    # and removing the ``id-token`` permission.
    permissions:
      id-token: write  # required for PEP 740 OIDC token minting
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No ``password:`` — Trusted Publisher binding handles auth.
          # Attestations published automatically per PEP 740.

  github-release:
    name: GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to create the release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/
      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the section between this version's heading and the next
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.changelog.outputs.version }}
          body_path: release_notes.md
          files: |
            dist/*
            sbom/signet-sbom.cdx.json
          generate_release_notes: false
          prerelease: ${{ contains(steps.changelog.outputs.version, 'a') || contains(steps.changelog.outputs.version, 'b') || contains(steps.changelog.outputs.version, 'rc') }}
