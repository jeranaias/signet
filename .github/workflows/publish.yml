name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for hatchling version resolution
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build distributions
        run: python -m build
      - name: Inspect sdist + wheel
        run: |
          ls -la dist/
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Generate CycloneDX SBOM
        run: |
          python -m pip install --upgrade cyclonedx-bom
          # Component-graph SBOM for the built environment. Attached to
          # the GitHub release so downstreams can audit dependencies
          # without reproducing the build.
          mkdir -p sbom
          cyclonedx-py environment --output-format json --outfile sbom/signet-sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/

  github-release:
    name: GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to create the release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/
      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the section between this version's heading and the next
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.changelog.outputs.version }}
          body_path: release_notes.md
          files: |
            dist/*
            sbom/signet-sbom.cdx.json
          generate_release_notes: false
          prerelease: ${{ contains(steps.changelog.outputs.version, 'a') || contains(steps.changelog.outputs.version, 'b') || contains(steps.changelog.outputs.version, 'rc') }}
